<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Web</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #252525;
    --border: #333;
    --text: #e5e5e5;
    --text-muted: #888;
    --accent: #b388ff;
    --user-msg: #2d1b69;
    --assistant-msg: #1a1a2e;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --font-mono: 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); }

  .container { display: flex; flex-direction: column; height: 100vh; max-width: 900px; margin: 0 auto; padding: 0 16px; }

  header {
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header .status { font-size: 12px; color: var(--text-muted); }
  header .dot { width: 8px; height: 8px; border-radius: 50%; background: #4caf50; display: inline-block; }

  #chat {
    flex: 1; overflow-y: auto; padding: 20px 0;
    scroll-behavior: smooth;
  }
  #chat::-webkit-scrollbar { width: 6px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .msg { margin-bottom: 20px; display: flex; }
  .msg.user { justify-content: flex-end; }

  .msg-content {
    max-width: 85%; padding: 12px 16px; border-radius: 12px;
    line-height: 1.6; font-size: 14px;
    white-space: pre-wrap; word-wrap: break-word;
  }
  .msg.user .msg-content {
    background: var(--user-msg);
    border-bottom-right-radius: 4px;
  }
  .msg.assistant .msg-content {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .msg-content p { margin-bottom: 8px; }
  .msg-content p:last-child { margin-bottom: 0; }
  .msg-content pre {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px; margin: 8px 0;
    overflow-x: auto; font-family: var(--font-mono); font-size: 13px;
  }
  .msg-content code {
    font-family: var(--font-mono); font-size: 13px;
    background: var(--surface2); padding: 2px 6px; border-radius: 4px;
  }
  .msg-content pre code { background: none; padding: 0; }
  .msg-content ul, .msg-content ol { padding-left: 20px; margin: 8px 0; }

  .input-area {
    padding: 16px 0; flex-shrink: 0;
    border-top: 1px solid var(--border);
  }
  .input-wrapper {
    display: flex; gap: 8px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 8px 12px;
    transition: border-color .2s;
  }
  .input-wrapper:focus-within { border-color: var(--accent); }
  textarea {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-family: var(--font); font-size: 14px;
    resize: none; min-height: 24px; max-height: 200px;
    line-height: 1.5;
  }
  textarea::placeholder { color: var(--text-muted); }
  button {
    background: var(--accent); color: #fff; border: none;
    border-radius: 8px; width: 36px; height: 36px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: opacity .2s;
    font-size: 18px;
  }
  button:hover { opacity: .85; }
  button:disabled { opacity: .4; cursor: not-allowed; }

  .welcome {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100%; color: var(--text-muted);
    text-align: center; gap: 12px;
  }
  .welcome h2 { font-size: 24px; color: var(--text); }
  .welcome p { font-size: 14px; max-width: 400px; }

  .thinking { color: var(--text-muted); font-style: italic; font-size: 13px; }

  @media (max-width: 600px) {
    .container { padding: 0 12px; }
    .msg-content { max-width: 92%; font-size: 15px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <span class="dot"></span>
    <h1>Claude Web</h1>
    <span class="status">deepseek-chat</span>
  </header>

  <div id="chat">
    <div class="welcome" id="welcome">
      <h2>你好，有什么可以帮助你的？</h2>
      <p>发送消息开始对话。使用的是 DeepSeek 模型。</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="input" rows="1" placeholder="输入消息..." autofocus></textarea>
      <button id="sendBtn" disabled>&#x2191;</button>
    </div>
  </div>
</div>

<script>
const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const welcomeEl = document.getElementById('welcome');

const messages = [];

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function renderMarkdown(text) {
  let html = text;

  // Code blocks
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    return `<pre><code>${escapeHtml(code.trim())}</code></pre>`;
  });

  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Lists
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');

  // Numbered lists
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, (match) => {
    if (!match.startsWith('<ul>')) return '<ol>' + match + '</ol>';
    return match;
  });

  // Newlines to paragraphs
  html = html.replace(/\n\n/g, '</p><p>');
  html = html.replace(/\n/g, '<br>');

  return '<p>' + html + '</p>';
}

function addMessage(role, text) {
  welcomeEl.style.display = 'none';

  const div = document.createElement('div');
  div.className = 'msg ' + role;

  const content = document.createElement('div');
  content.className = 'msg-content';

  if (role === 'assistant') {
    content.innerHTML = renderMarkdown(text);
  } else {
    content.textContent = text;
  }

  div.appendChild(content);
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function addThinking() {
  welcomeEl.style.display = 'none';
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = 'thinking-msg';
  const content = document.createElement('div');
  content.className = 'msg-content thinking';
  content.textContent = '思考中...';
  div.appendChild(content);
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function removeThinking() {
  const el = document.getElementById('thinking-msg');
  if (el) el.remove();
}

function updateLastMessage(text) {
  const msgs = chatEl.querySelectorAll('.msg.assistant:not(#thinking-msg)');
  const last = msgs[msgs.length - 1];
  if (last) {
    const content = last.querySelector('.msg-content');
    if (content) content.innerHTML = renderMarkdown(text);
    chatEl.scrollTop = chatEl.scrollHeight;
  }
}

function autoResize() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + 'px';
}

inputEl.addEventListener('input', () => {
  sendBtn.disabled = !inputEl.value.trim();
  autoResize();
});

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = '';
  sendBtn.disabled = true;
  autoResize();

  addMessage('user', text);
  messages.push({ role: 'user', content: text });

  addThinking();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: messages.slice(-20), // last 20 for context
      }),
    });

    removeThinking();

    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: res.statusText }));
      addMessage('assistant', `错误: ${err.error || '请求失败'}`);
      return;
    }

    const data = await res.json();
    addMessage('assistant', data.text);
    messages.push({ role: 'assistant', content: data.text });
  } catch (err) {
    removeThinking();
    addMessage('assistant', `网络错误: ${err.message}`);
  }
}

sendBtn.addEventListener('click', sendMessage);
</script>
</body>
</html>
